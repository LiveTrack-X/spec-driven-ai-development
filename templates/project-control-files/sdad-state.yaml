version: 2
updated: YYYY-MM-DD

# standard | full
scale: standard
# unit | packet; this boundary does not replace owner gates.
execution_scope: packet

active_spec: SPEC/SPEC-COMPLETE.md
active_packet:
  id: bootstrap
  objective: Replace with the current evidence-ready objective.
  status: not_started

# Must equal active_packet.id after the validation contract is reviewed.
validation_for: bootstrap

# Optional. Uncomment only when a current resume checkpoint actually exists.
# current_handoff: docs/sdad/handoffs/YYYY-MM-DD-HNNNN-topic.md

# Keep only gates that can stop the current packet.
owner_gates: []

# Keep commands short and runnable from the repository root.
validation:
  - command: Replace with the project validation command.
    proves: Replace with the claim this command supports.

# Eligible current-packet selections; intent chooses which targeted content to read.
routed_docs:
  - docs/TODO-Open-Items.md
  - review-findings.md
